<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b84a39", // Soft red accent for museum aesthetic
                        "accent-gold": "#d2ae1e",
                        "background-light": "#f5f3ef", // Beige background
                        "background-dark": "#211e11",
                        "muted-taupe": "#e6e2d1",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Newsreader', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #b84a39;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between border-b border-muted-taupe px-8 py-4 bg-background-light/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">storm</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900">AI 创意中心</h1>
</div>
<nav class="flex items-center gap-10">
<a class="text-sm font-medium hover:text-primary transition-colors border-b-2 border-primary" href="#">设计器</a>
<a class="text-sm font-medium hover:text-primary transition-colors text-slate-600" href="#">文化素材库</a>
<a class="text-sm font-medium hover:text-primary transition-colors text-slate-600" href="#">我的作品集</a>
<a class="text-sm font-medium hover:text-primary transition-colors text-slate-600" href="#">创作者社区</a>
</nav>
<div class="flex items-center gap-3">
<button class="p-2 rounded hover:bg-muted-taupe transition-colors">
<span class="material-symbols-outlined">search</span>
</button>
<button class="p-2 rounded hover:bg-muted-taupe transition-colors">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary/20 flex items-center justify-center text-primary ml-2 overflow-hidden border border-primary/30">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</header>
<main class="flex flex-1 overflow-hidden">
<!-- Left Sidebar: Tools (Optional but helpful for museum feel) -->
<aside class="w-16 border-r border-muted-taupe flex flex-col items-center py-6 gap-6 bg-background-light">
<button class="w-10 h-10 flex items-center justify-center rounded bg-primary text-white shadow-sm">
<span class="material-symbols-outlined">deployed_code</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded hover:bg-muted-taupe text-slate-600">
<span class="material-symbols-outlined">brush</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded hover:bg-muted-taupe text-slate-600">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded hover:bg-muted-taupe text-slate-600">
<span class="material-symbols-outlined">photo_camera</span>
</button>
</aside>
<!-- Main Workspace -->
<section class="flex-1 flex flex-col relative bg-[#efede8]">
<!-- 3D Model Viewport Area -->
<div class="flex-1 flex items-center justify-center p-12 relative overflow-hidden">
<!-- Abstract Gradient for 3D staging background -->
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-transparent to-transparent"></div>

<div class="relative w-80 h-[450px] group">
<div class="absolute inset-0 bg-white rounded-t-[100px] rounded-b-[40px] shadow-2xl border border-slate-200 overflow-hidden">

</div>
<!-- Highlights and Shadows for 3D feel -->
<div class="absolute inset-0 bg-gradient-to-r from-black/20 via-transparent to-white/30"></div>
<div class="absolute top-0 left-1/4 w-1/2 h-full bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>
</div>
<!-- Handle -->
<div class="absolute -right-12 top-24 w-20 h-32 border-[16px] border-white rounded-full shadow-lg -z-10"></div>
</div>
<!-- Labels and HUD -->
<div class="absolute top-6 left-6 bg-white/60 backdrop-blur px-4 py-2 rounded border border-white/40 shadow-sm">
<span class="text-xs uppercase tracking-widest text-slate-500 font-bold">当前模型</span>
<p class="text-sm font-display font-semibold">白瓷茶盏 - 极简系列</p>

<div class="absolute bottom-32 right-6 flex flex-col gap-2">
<button class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center text-slate-600 hover:text-primary">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<button class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center text-slate-600 hover:text-primary">
<span class="material-symbols-outlined">sync</span>
</button>
</div>
</div>
<!-- Bottom Control Panel: Sliders -->
<div class="h-32 bg-white border-t border-muted-taupe flex items-center justify-between px-10">
<div class="flex flex-1 gap-12 max-w-4xl">
<div class="flex-1 space-y-2">
<div class="flex justify-between">
<label class="text-xs font-bold text-slate-500 uppercase tracking-tighter">图案缩放 SCALE</label>
<span class="text-xs font-medium text-primary">65%</span>
</div>
<input class="w-full h-1 bg-muted-taupe rounded-lg appearance-none cursor-pointer accent-primary" type="range"/>
</div>
<div class="flex-1 space-y-2">
<div class="flex justify-between">
<label class="text-xs font-bold text-slate-500 uppercase tracking-tighter">图案旋转 ROTATION</label>
<span class="text-xs font-medium text-primary">45°</span>
</div>
<input class="w-full h-1 bg-muted-taupe rounded-lg appearance-none cursor-pointer accent-primary" type="range"/>
</div>
<div class="flex-1 space-y-2">
<div class="flex justify-between">
<label class="text-xs font-bold text-slate-500 uppercase tracking-tighter">透明度 OPACITY</label>
<span class="text-xs font-medium text-primary">80%</span>
</div>
<input class="w-full h-1 bg-muted-taupe rounded-lg appearance-none cursor-pointer accent-primary" type="range"/>
</div>
</div>
<div class="ml-10 flex gap-4">
<button class="px-6 py-2 border border-primary text-primary text-sm font-bold rounded-lg hover:bg-primary/5 transition-colors">重置</button>
<button class="px-8 py-2 bg-primary text-white text-sm font-bold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-transform active:scale-95">保存成品</button>
</div>
</div>

<div class="group cursor-pointer">

</div>
<!-- Footer of Sidebar -->
<div class="p-6 bg-muted-taupe/20 border-t border-muted-taupe">
<button class="w-full flex items-center justify-center gap-2 py-3 border-2 border-dashed border-primary/40 rounded-lg text-primary text-sm font-bold hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined">add_circle</span>

</div>
